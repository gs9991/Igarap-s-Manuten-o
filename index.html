<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hotel Fazenda Igarapés — Manutenção</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; min-height: 100vh; color: #e8e8e8; }
  :root {
    --accent: #c9a84c; --accent-dim: rgba(201,168,76,0.12); --accent-dim2: rgba(201,168,76,0.22);
    --bg0: #0f0f0f; --bg1: #1a1a1a; --bg2: #222; --bg3: #2a2a2a;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.13);
    --text: #e8e8e8; --text2: #888; --text3: #555;
    --red: #e05a5a; --red-dim: rgba(224,90,90,0.12);
    --blue: #5a9ee0; --blue-dim: rgba(90,158,224,0.12);
    --green: #5ac87a; --green-dim: rgba(90,200,122,0.12);
    --amber: #e0a855; --amber-dim: rgba(224,168,85,0.12);
  }
  .app { display: flex; flex-direction: column; min-height: 100vh; }
  .login-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:2rem; background:var(--bg0); }
  .login-card { background:var(--bg1); border:1px solid rgba(201,168,76,0.25); border-radius:16px; padding:2.2rem; width:100%; max-width:380px; box-shadow:0 8px 40px rgba(0,0,0,0.6); }
  .brand { text-align:center; margin-bottom:2rem; }
  .brand h1 { font-size:20px; font-weight:600; color:var(--text); letter-spacing:-0.3px; }
  .brand p { font-size:13px; color:var(--text2); margin-top:5px; }
  .field { margin-bottom:14px; }
  .field label { display:block; font-size:12px; color:var(--text2); margin-bottom:6px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
  .field input, .field select, .field textarea { width:100%; padding:10px 13px; border:1px solid var(--border2); border-radius:8px; font-size:14px; background:var(--bg2); color:var(--text); font-family:inherit; transition:border-color 0.15s; }
  .field input:focus, .field select:focus, .field textarea:focus { outline:none; border-color:var(--accent); }
  .field select option { background:var(--bg2); }
  .field textarea { resize:vertical; min-height:80px; }
  .btn { padding:10px 16px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; border:none; transition:opacity 0.15s, transform 0.1s; display:inline-flex; align-items:center; gap:6px; font-family:inherit; }
  .btn:hover { opacity:0.85; } .btn:active { transform:scale(0.98); }
  .btn-full { width:100%; justify-content:center; }
  .btn-accent { background:var(--accent); color:#111; }
  .btn-outline { background:transparent; border:1px solid var(--border2); color:var(--text); }
  .btn-red { background:var(--red-dim); color:var(--red); border:1px solid rgba(224,90,90,0.25); }
  .btn-blue { background:var(--blue-dim); color:var(--blue); border:1px solid rgba(90,158,224,0.25); }
  .btn-green { background:var(--green-dim); color:var(--green); border:1px solid rgba(90,200,122,0.25); }
  .btn-amber { background:var(--amber-dim); color:var(--amber); border:1px solid rgba(224,168,85,0.25); }
  .btn-sm { padding:7px 14px; font-size:13px; }
  .btn-xs { padding:5px 11px; font-size:12px; border-radius:6px; font-weight:600; }
  .header { background:var(--bg1); border-bottom:1px solid var(--border); padding:13px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
  .header-logo { display:flex; align-items:center; gap:10px; }
  .header-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); }
  .header h2 { font-size:15px; font-weight:600; color:var(--text); letter-spacing:-0.2px; }
  .header-right { display:flex; align-items:center; gap:10px; }
  .avatar { width:32px; height:32px; border-radius:50%; background:var(--accent-dim); border:1px solid rgba(201,168,76,0.3); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--accent); }
  .logout-btn { background:var(--bg3); border:1px solid var(--border2); color:var(--text2); padding:5px 12px; border-radius:6px; font-size:12px; cursor:pointer; font-weight:600; font-family:inherit; }
  .logout-btn:hover { color:var(--text); }
  .main { padding:20px; flex:1; max-width:700px; margin:0 auto; width:100%; }
  .page { display:none; }
  .page.active { display:block; }
  .role-badge { display:inline-block; font-size:11px; padding:3px 10px; border-radius:20px; font-weight:700; }
  .role-recepcao { background:var(--blue-dim); color:var(--blue); }
  .role-manutencao { background:var(--amber-dim); color:var(--amber); }
  .role-admin { background:var(--accent-dim); color:var(--accent); }
  .status-badge { display:inline-block; font-size:11px; padding:3px 10px; border-radius:20px; font-weight:700; }
  .status-aberto { background:var(--amber-dim); color:var(--amber); }
  .status-em-andamento { background:var(--blue-dim); color:var(--blue); }
  .status-concluido { background:var(--green-dim); color:var(--green); }
  .status-urgente { background:var(--red-dim); color:var(--red); }
  .card { background:var(--bg1); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:10px; transition:border-color 0.15s; }
  .card:hover { border-color:var(--border2); }
  .card-title { font-size:15px; font-weight:600; color:var(--text); margin-bottom:2px; }
  .card-sub { font-size:13px; color:var(--text2); }
  .card-footer { display:flex; align-items:center; justify-content:space-between; margin-top:12px; padding-top:12px; border-top:1px solid var(--border); flex-wrap:wrap; gap:8px; }
  .card-actions { display:flex; gap:8px; flex-wrap:wrap; }
  .metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
  .metric { background:var(--bg1); border:1px solid var(--border); border-radius:12px; padding:16px; text-align:center; }
  .metric-num { font-size:30px; font-weight:700; }
  .metric-label { font-size:11px; color:var(--text2); margin-top:3px; text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
  .metric-aberto .metric-num { color:var(--amber); }
  .metric-andamento .metric-num { color:var(--blue); }
  .metric-concluido .metric-num { color:var(--green); }
  .section-title { font-size:12px; font-weight:700; color:var(--text2); margin-bottom:12px; margin-top:22px; text-transform:uppercase; letter-spacing:0.6px; }
  .section-title:first-child { margin-top:0; }
  .tabs { display:flex; margin-bottom:18px; border-bottom:1px solid var(--border); overflow-x:auto; }
  .tab { padding:9px 16px; font-size:13px; cursor:pointer; color:var(--text2); border-bottom:2px solid transparent; margin-bottom:-1px; white-space:nowrap; font-weight:500; transition:color 0.15s; }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:700; }
  .tab:hover { color:var(--text); }
  .notif { background:var(--blue-dim); border:1px solid rgba(90,158,224,0.2); border-radius:10px; padding:12px 14px; margin-bottom:12px; display:flex; align-items:flex-start; gap:10px; }
  .notif-dot { width:8px; height:8px; border-radius:50%; background:var(--blue); margin-top:4px; flex-shrink:0; }
  .notif-text { font-size:13px; color:var(--blue); font-weight:500; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  @media(max-width:480px){ .form-row { grid-template-columns:1fr; } }
  .upload-area {
    border:1px dashed var(--border2); border-radius:10px; padding:24px;
    text-align:center; color:var(--text2); font-size:13px; cursor:pointer;
    margin-top:4px; transition:background 0.15s, border-color 0.15s; position:relative;
  }
  .upload-area:hover { background:var(--bg2); border-color:var(--accent); }
  .upload-area input[type="file"] {
    position:absolute; inset:0; width:100%; height:100%;
    opacity:0; cursor:pointer; font-size:0;
  }
  .upload-preview { margin-top:12px; display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
  .upload-thumb {
    position:relative; width:80px; height:80px; border-radius:8px;
    overflow:hidden; border:1px solid var(--border2); background:var(--bg3);
    display:flex; align-items:center; justify-content:center;
  }
  .upload-thumb img { width:100%; height:100%; object-fit:cover; }
  .upload-thumb .rm {
    position:absolute; top:2px; right:2px; background:rgba(0,0,0,0.7);
    border:none; color:white; border-radius:50%; width:18px; height:18px;
    cursor:pointer; font-size:11px; display:flex; align-items:center; justify-content:center; line-height:1;
  }
  .upload-thumb .file-icon { font-size:28px; }
  .upload-count { font-size:12px; color:var(--accent); font-weight:600; margin-top:6px; }
  .user-row { display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border); }
  .user-info { display:flex; align-items:center; gap:10px; }
  .user-avatar { width:38px; height:38px; border-radius:50%; background:var(--bg3); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--text2); border:1px solid var(--border2); }
  .suite-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-size:14px; color:var(--text); }
  .empty { text-align:center; padding:40px 20px; color:var(--text3); font-size:14px; }
  .alert { padding:12px 14px; border-radius:8px; font-size:13px; margin-bottom:14px; font-weight:500; }
  .alert-success { background:var(--green-dim); color:var(--green); border:1px solid rgba(90,200,122,0.2); }
  .alert-info { background:var(--blue-dim); color:var(--blue); border:1px solid rgba(90,158,224,0.2); }
  .alert-error { background:var(--red-dim); color:var(--red); border:1px solid rgba(224,90,90,0.2); }
  .detail-view { display:none; }
  .detail-view.open { display:block; }
  .back-btn { display:inline-flex; align-items:center; gap:6px; color:var(--text2); font-size:13px; cursor:pointer; margin-bottom:16px; background:none; border:none; font-weight:600; padding:6px 0; font-family:inherit; }
  .back-btn:hover { color:var(--text); }
  .history-item { display:flex; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
  .history-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); margin-top:6px; flex-shrink:0; }
  .history-text { font-size:13px; color:var(--text2); }
  .history-time { font-size:11px; color:var(--text3); margin-top:2px; }
  .divider { height:1px; background:var(--border); margin:18px 0; }
  #login-error { font-size:13px; color:var(--red); text-align:center; margin-top:10px; display:none; font-weight:500; }
  .confirm-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px; }
  .confirm-box { background:var(--bg1); border:1px solid var(--border2); border-radius:14px; padding:24px; max-width:340px; width:100%; }
  .confirm-box h3 { font-size:16px; font-weight:600; margin-bottom:8px; }
  .confirm-box p { font-size:13px; color:var(--text2); margin-bottom:20px; line-height:1.5; }
  .confirm-actions { display:flex; gap:10px; justify-content:flex-end; }
</style>
</head>
